name: Daily Login and Check-in

on:
  schedule:
    - cron: '0 2 * * *'  # 北京时间10:00
  workflow_dispatch:

env:
  NODE_VERSION: '24'

jobs:
  login-checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright
      run: npx playwright install --with-deps chromium
      
    - name: Run login and check-in for account1
      env:
        SILICONCLOUD_API_KEY: ${{ secrets.SILICONCLOUD_API_KEY }}
        PTCAFE_USERNAME: ${{ secrets.USERNAME1 }}
        PTCAFE_PASSWORD: ${{ secrets.PASSWORD1 }}
        NODE_ENV: production
      run: npx playwright test
    
    - name: Run login and check-in for account2
      env:
        SILICONCLOUD_API_KEY: ${{ secrets.SILICONCLOUD_API_KEY }}
        PTCAFE_USERNAME: ${{ secrets.USERNAME2 }}
        PTCAFE_PASSWORD: ${{ secrets.PASSWORD2 }}
        NODE_ENV: production
      run: npx playwright test
      
    - name: Upload screenshots
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: screenshots-${{ github.run_number }}
        path: "*.png"
        retention-days: 7
        
    - name: Send notification on failure
      if: failure()
      run: |
        curl -X POST "${{ secrets.WEBHOOK_URL }}" \
        -H "Content-Type: application/json;charset=utf-8" \
        -d '{
          "title": "ptcafe签到失败",
          "desp":  "❌ PTCafe 自动签到失败\n时间: '"$(date)"'\n请检查 GitHub Actions 日志和截图\n链接: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        }'
